<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研打卡系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .countdown { font-size: 1.1rem; }
        .countdown span { font-size: 1.8rem; font-weight: bold; color: #ffd700; }
        
        .members {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }
        
        .member-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .member-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: bold; color: white; margin-right: 12px;
        }
        .avatar.xixian { background: linear-gradient(135deg, #667eea, #764ba2); }
        .avatar.liushen { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .avatar.huangsir { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        
        .member-info h3 { font-size: 1.2rem; color: #333; }
        .member-info p { color: #666; font-size: 0.85rem; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .stat-box .number { font-size: 1.5rem; font-weight: bold; color: #667eea; }
        .stat-box .label { font-size: 0.75rem; color: #666; }
        
        .checked-today {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section h4 { margin-bottom: 12px; color: #333; font-size: 0.95rem; }
        
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        input[type="number"], input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        input:focus { outline: none; border-color: #667eea; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .progress-item { margin-bottom: 12px; }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }
        
        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }
        .history-item {
            padding: 8px;
            background: white;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .history-item .date { color: #999; font-size: 0.75rem; }
        .history-item .hours { color: #667eea; font-weight: bold; }
        
        .loading {
            text-align: center;
            color: white;
            padding: 50px;
            font-size: 1.2rem;
        }
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.5rem; }
            .members { grid-template-columns: 1fr; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 考研打卡系统</h1>
            <div class="countdown">距离考研还有 <span id="countdown">--</span> 天</div>
        </div>
        
        <div id="error" class="error" style="display:none"></div>
        <div id="loading" class="loading">加载中...</div>
        <div class="members" id="members" style="display:none"></div>
    </div>

    <script>
        const EXAM_DATE = new Date('2025-12-20');
        let membersData = {};
        
        // 科目名称映射
        const subjectNames = {
            xixian: { p1: '计算机网络', p2: '操作系统', p3: '计算机组成原理', p4: '数据结构' },
            liushen: { p1: '专业课一', p2: '专业课二', p3: '数学' },
            huangsir: { p1: '专业课一', p2: '专业课二', p3: '数学' }
        };
        
        function updateCountdown() {
            const days = Math.ceil((EXAM_DATE - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').textContent = days > 0 ? days : 0;
        }
        
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                if (!res.ok) throw new Error('加载失败');
                membersData = await res.json();
                render();
            } catch (err) {
                showError('加载数据失败: ' + err.message);
            }
        }
        
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }
        
        async function checkIn(id) {
            const hours = parseFloat(document.getElementById(`hours-${id}`).value);
            const content = document.getElementById(`content-${id}`).value || '今日学习打卡';
            const btn = document.getElementById(`btn-${id}`);
            
            if (!hours || hours <= 0 || hours > 24) {
                alert('请输入有效的学习时长(0-24小时)');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '保存中...';
            
            try {
                const res = await fetch(`/api/checkin/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hours, content })
                });
                
                const result = await res.json();
                if (result.success) {
                    membersData[id] = result.member;
                    render();
                    alert(`${membersData[id].name} 打卡成功！今日学习 ${hours} 小时`);
                } else {
                    alert(result.error || '打卡失败');
                }
            } catch (err) {
                alert('网络错误，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = membersData[id].lastCheckIn === new Date().toDateString() ? '更新今日打卡' : '立即打卡';
            }
        }
        
        async function updateProgress(id, key) {
            const value = document.getElementById(`progress-${id}-${key}`).value;
            const progress = {};
            progress[key] = parseInt(value);
            
            try {
                const res = await fetch(`/api/progress/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ progress })
                });
                
                const result = await res.json();
                if (result.success) {
                    membersData[id] = result.member;
                    render();
                }
            } catch (err) {
                console.error('更新进度失败:', err);
            }
        }
        
        function render() {
            const container = document.getElementById('members');
            const today = new Date().toDateString();
            
            container.innerHTML = Object.entries(membersData).map(([id, m]) => {
                const isChecked = m.lastCheckIn === today;
                const names = subjectNames[id];
                
                const progressHtml = Object.entries(m.progress).map(([key, val]) => `
                    <div class="progress-item">
                        <div class="progress-header">
                            <span>${names[key] || key}</span>
                            <span>${val}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${val}%"></div>
                        </div>
                        <input type="range" id="progress-${id}-${key}" value="${val}" min="0" max="100"
                               onchange="updateProgress('${id}', '${key}')">
                    </div>
                `).join('');
                
                const historyHtml = m.history.slice(0, 5).map(h => `
                    <div class="history-item">
                        <div class="date">${h.date}</div>
                        <div><span class="hours">${h.hours}h</span> ${h.content}</div>
                    </div>
                `).join('') || '<p style="color:#999;text-align:center;font-size:0.85rem">暂无记录</p>';
                
                return `
                    <div class="member-card">
                        <div class="member-header">
                            <div class="avatar ${id}">${m.name[0]}</div>
                            <div class="member-info">
                                <h3>${m.name}</h3>
                                <p>${m.school} · ${m.subject}</p>
                            </div>
                        </div>
                        
                        <div class="stats">
                            <div class="stat-box">
                                <div class="number">${m.totalDays}</div>
                                <div class="label">打卡天数</div>
                            </div>
                            <div class="stat-box">
                                <div class="number">${m.totalHours.toFixed(1)}</div>
                                <div class="label">总时长(h)</div>
                            </div>
                            <div class="stat-box">
                                <div class="number">${m.todayHours.toFixed(1)}</div>
                                <div class="label">今日(h)</div>
                            </div>
                        </div>
                        
                        ${isChecked ? `<div class="checked-today">✅ 今日已打卡 ${m.todayHours}h</div>` : ''}
                        
                        <div class="section">
                            <h4>📝 今日打卡</h4>
                            <div class="input-group">
                                <input type="number" id="hours-${id}" placeholder="时长(小时)" step="0.5" min="0" max="24" value="${isChecked ? m.todayHours : ''}">
                                <input type="text" id="content-${id}" placeholder="学习内容">
                            </div>
                            <button class="btn btn-primary" id="btn-${id}" onclick="checkIn('${id}')">
                                ${isChecked ? '更新今日打卡' : '立即打卡'}
                            </button>
                        </div>
                        
                        <div class="section">
                            <h4>📊 学习进度</h4>
                            ${progressHtml}
                        </div>
                        
                        <div class="section">
                            <h4>📜 最近打卡</h4>
                            <div class="history-list">${historyHtml}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('members').style.display = 'grid';
        }
        
        updateCountdown();
        loadData();
        setInterval(updateCountdown, 60000);
    </script>
</body>
</html>
