<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三人考研打卡 - 南大/矿大冲刺</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .countdown { font-size: 1.2rem; opacity: 0.9; }
        .members { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .member-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .member-card:hover { transform: translateY(-5px); }
        .member-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: white; }
        .xixian { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .liushen { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .huangsir { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .member-info { flex: 1; }
        .member-info h3 { font-size: 1.3rem; color: #333; }
        .member-info p { color: #666; font-size: 0.9rem; margin-top: 4px; }
        .edit-info-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px; opacity: 0.6; transition: opacity 0.2s; }
        .edit-info-btn:hover { opacity: 1; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat { flex: 1; text-align: center; padding: 10px; background: #f8f9fa; border-radius: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
        .check-in { margin-bottom: 20px; }
        .check-in h4 { color: #555; margin-bottom: 10px; font-size: 0.95rem; }
        .check-in-form { display: flex; gap: 10px; margin-bottom: 10px; }
        .check-in-form input[type="number"] { width: 80px; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .check-in-form input[type="text"] { flex: 1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .check-in-form button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .check-in-form button:hover { background: #5a67d8; }
        .progress-section { margin-bottom: 20px; }
        .progress-section h4 { color: #555; margin-bottom: 10px; font-size: 0.95rem; }
        .progress-item { margin-bottom: 10px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #666; margin-bottom: 5px; }
        .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.5s; }
        .thoughts { margin-top: 20px; }
        .thoughts h4 { color: #555; margin-bottom: 10px; font-size: 0.95rem; }
        .thoughts textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; resize: vertical; min-height: 80px; font-family: inherit; }
        .thoughts button { margin-top: 10px; padding: 10px 20px; background: #48bb78; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .thoughts-list { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .thought-item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .thought-meta { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .thought-content { color: #444; line-height: 1.5; white-space: pre-wrap; }
        .shared-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .shared-section h2 { color: #333; margin-bottom: 20px; text-align: center; }
        .quote-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; font-size: 1.1rem; margin-bottom: 20px; }
        footer { text-align: center; color: white; opacity: 0.8; margin-top: 30px; padding: 20px; }
        .edit-progress { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .edit-progress input { width: 60px; padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; }
        .edit-progress button { padding: 8px 16px; background: #ed8936; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 20px; color: #333; }
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; margin-bottom: 5px; color: #555; font-size: 0.9rem; }
        .modal-field input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .subjects-list { margin-top: 10px; }
        .subject-input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .subject-input-row input { flex: 1; }
        .subject-input-row button { background: #e53e3e; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .add-subject-btn { background: #48bb78; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions button { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .btn-cancel { background: #e0e0e0; border: none; color: #555; }
        .btn-save { background: #667eea; border: none; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 三人考研打卡</h1>
            <p class="countdown">距离考研还有 <span id="daysLeft">--</span> 天</p>
        </header>
        
        <div class="members" id="members-container">
            <!-- 动态生成 -->
        </div>
        
        <div class="shared-section">
            <h2>🌟 每日一句</h2>
            <div class="quote-box" id="dailyQuote">"星光不问赶路人，时光不负有心人。"</div>
        </div>
        
        <footer>
            <p>三人行，必有我师焉 💪</p>
            <p>希贤 × 刘神 × 黄sir | 2026考研加油</p>
        </footer>
    </div>
    
    <!-- 编辑信息弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>✏️ 编辑个人信息</h3>
            <div class="modal-field">
                <label>目标院校</label>
                <input type="text" id="modal-school" placeholder="例如：南京大学">
            </div>
            <div class="modal-field">
                <label>专业方向</label>
                <input type="text" id="modal-major" placeholder="例如：软件学院">
            </div>
            <div class="modal-field">
                <label>考试科目（可添加多个）</label>
                <div class="subjects-list" id="modal-subjects"></div>
                <button class="add-subject-btn" onclick="addSubjectInput()">+ 添加科目</button>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-save" onclick="saveMemberInfo()">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        const examDate = new Date('2026-12-26');
        let editingMember = null;
        let membersData = {};
        
        const quotes = [
            "星光不问赶路人，时光不负有心人。",
            "你背不下来的书，总有人能背下来。",
            "考研就像在黑屋子里洗衣服，你不知道洗干净没有。",
            "坚持的意义：以后的日子里，放眼望去，全部都是自己喜欢的人和事。",
            "那些看似不起波澜的日复一日，会突然在某一天让人看到坚持的意义。",
            "愿你以渺小启程，以伟大结束。",
            "没有醒不来的早晨，没有熬不过的迷茫。"
        ];
        
        async function init() {
            updateCountdown();
            updateDailyQuote();
            setInterval(updateCountdown, 60000);
            await loadData();
        }
        
        function updateCountdown() {
            const now = new Date();
            const diff = examDate - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('daysLeft').textContent = days > 0 ? days : 0;
        }
        
        function updateDailyQuote() {
            const dayIndex = new Date().getDate() % quotes.length;
            document.getElementById('dailyQuote').textContent = quotes[dayIndex];
        }
        
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                membersData = await res.json();
                renderMembers();
            } catch (err) {
                console.error('加载数据失败:', err);
                alert('加载数据失败，请刷新页面重试');
            }
        }
        
        function renderMembers() {
            const container = document.getElementById('members-container');
            container.innerHTML = Object.keys(membersData).map(key => {
                const m = membersData[key];
                const avatarClass = key;
                const avatarText = m.name[0];
                
                let progressHTML = '';
                let inputsHTML = '';
                m.subjects.forEach((subject, idx) => {
                    const pKey = `p${idx + 1}`;
                    const val = m.progress[pKey] || 0;
                    progressHTML += `<div class="progress-item"><div class="progress-header"><span>${subject}</span><span id="${key}-${pKey}-text">${val}%</span></div><div class="progress-bar"><div class="progress-fill" id="${key}-${pKey}-bar" style="width: ${val}%"></div></div></div>`;
                    inputsHTML += `<input type="number" id="${key}-${pKey}-input" placeholder="${subject}%" min="0" max="100">`;
                });
                
                const thoughtsHTML = m.thoughts.map(t => `<div class="thought-item"><div class="thought-meta">${t.date}</div><div class="thought-content">${escapeHtml(t.content)}</div></div>`).join('');
                
                return `
                    <div class="member-card">
                        <div class="member-header">
                            <div class="avatar ${avatarClass}">${avatarText}</div>
                            <div class="member-info">
                                <h3>${m.name}</h3>
                                <p id="${key}-target">🎯 ${m.school} | ${m.major}</p>
                            </div>
                            <button class="edit-info-btn" onclick="openEditModal('${key}')" title="编辑信息">✏️</button>
                        </div>
                        <div class="stats">
                            <div class="stat"><div class="stat-value" id="${key}-days">${m.totalDays}</div><div class="stat-label">打卡天数</div></div>
                            <div class="stat"><div class="stat-value" id="${key}-hours">${m.totalHours.toFixed(1)}</div><div class="stat-label">总时长(h)</div></div>
                            <div class="stat"><div class="stat-value" id="${key}-today">${m.todayHours.toFixed(1)}</div><div class="stat-label">今日(h)</div></div>
                        </div>
                        <div class="check-in">
                            <h4>📍 今日打卡</h4>
                            <div class="check-in-form">
                                <input type="number" id="${key}-time" placeholder="小时" min="0" max="24" step="0.5">
                                <input type="text" id="${key}-content" placeholder="今天学了什么？">
                                <button onclick="checkIn('${key}')">打卡</button>
                            </div>
                        </div>
                        <div class="progress-section">
                            <h4>📚 专业课进度</h4>
                            ${progressHTML}
                            <div class="edit-progress">
                                ${inputsHTML}
                                <button onclick="updateProgress('${key}')">更新</button>
                            </div>
                        </div>
                        <div class="thoughts">
                            <h4>💭 学习感悟</h4>
                            <textarea id="${key}-thought" placeholder="写下今天的学习心得..."></textarea>
                            <button onclick="addThought('${key}')">发布感悟</button>
                            <div class="thoughts-list">${thoughtsHTML}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function openEditModal(member) {
            editingMember = member;
            const m = membersData[member];
            document.getElementById('modal-school').value = m.school;
            document.getElementById('modal-major').value = m.major;
            const container = document.getElementById('modal-subjects');
            container.innerHTML = '';
            m.subjects.forEach(s => addSubjectInput(s));
            document.getElementById('editModal').classList.add('active');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingMember = null;
        }
        
        function addSubjectInput(value = '') {
            const container = document.getElementById('modal-subjects');
            const row = document.createElement('div');
            row.className = 'subject-input-row';
            row.innerHTML = `<input type="text" placeholder="科目名称" value="${value}"><button onclick="this.parentElement.remove()">删除</button>`;
            container.appendChild(row);
        }
        
        async function saveMemberInfo() {
            if (!editingMember) return;
            const school = document.getElementById('modal-school').value.trim();
            const major = document.getElementById('modal-major').value.trim();
            const subjects = [];
            document.querySelectorAll('#modal-subjects input').forEach(input => {
                const val = input.value.trim();
                if (val) subjects.push(val);
            });
            if (!school || !major || subjects.length === 0) {
                alert('请填写完整信息！');
                return;
            }
            try {
                const res = await fetch(`/api/config/${editingMember}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ school, major, subjects })
                });
                if (res.ok) {
                    await loadData();
                    closeEditModal();
                    alert('信息已更新！');
                } else {
                    alert('保存失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        
        async function checkIn(member) {
            const timeInput = document.getElementById(`${member}-time`);
            const contentInput = document.getElementById(`${member}-content`);
            const hours = parseFloat(timeInput.value) || 0;
            const content = contentInput.value.trim();
            if (hours <= 0) { alert('请输入学习时长！'); return; }
            try {
                const res = await fetch(`/api/checkin/${member}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hours, content })
                });
                if (res.ok) {
                    await loadData();
                    timeInput.value = '';
                    contentInput.value = '';
                    alert('打卡成功！💪');
                } else {
                    alert('打卡失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        
        async function updateProgress(member) {
            const m = membersData[member];
            const progress = {};
            m.subjects.forEach((_, idx) => {
                const pKey = `p${idx + 1}`;
                const input = document.getElementById(`${member}-${pKey}-input`);
                if (input) progress[pKey] = parseInt(input.value) || 0;
            });
            try {
                const res = await fetch(`/api/progress/${member}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ progress })
                });
                if (res.ok) {
                    await loadData();
                    alert('进度已更新！');
                } else {
                    alert('更新失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        
        async function addThought(member) {
            const textarea = document.getElementById(`${member}-thought`);
            const content = textarea.value.trim();
            if (!content) { alert('请输入感悟内容！'); return; }
            try {
                const res = await fetch(`/api/thought/${member}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                if (res.ok) {
                    await loadData();
                    textarea.value = '';
                } else {
                    alert('发布失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        init();
    </script>
</body>
</html>
